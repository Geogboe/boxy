# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'


tasks:
  default: task --list

  go:run:
    desc: Run `boxy` via `go run`
    aliases:
      - run
    dir: '{{.ROOT_DIR}}'
    env:
      BOXY_WORKING_DIR: '{{.USER_WORKING_DIR}}'
    cmds:
      - go run ./cmd/boxy {{.CLI_ARGS}}

  serve:
    desc: Run `boxy serve` via `go run`
    cmds:
      - go run ./cmd/boxy serve {{.CLI_ARGS}}

  serve:once:
    desc: Run `boxy serve --once` via `go run`
    cmds:
      - go run ./cmd/boxy serve --once {{.CLI_ARGS}}

  build:
    desc: Build local ./boxy binary
    cmds:
      - go build -o ./boxy ./cmd/boxy

  install:
    desc: Install `boxy` into GOBIN/GOPATH/bin
    cmds:
      - go install ./cmd/boxy

  test:
    desc: Run all Go tests
    aliases:
      - t
    cmds:
      - go test ./...

  test:cli:
    desc: Run CLI package tests
    cmds:
      - go test ./internal/cli

  test:installers:
    desc: Run installer smoke tests
    aliases:
      - test:scripts
    cmds:
      - go test ./scripts

  test:installers:wsl:
    desc: Run the opt-in WSL installer smoke test
    platforms: [windows]
    env:
      BOXY_TEST_WSL: "1"
    cmds:
      - go test ./scripts -run TestInstallShWSL -count=1

  generate:
    desc: Run go generate (regenerate install scripts from templates)
    aliases:
      - gen
    cmds:
      - go generate ./scripts/...

  fmt:
    desc: Format all Go source files
    aliases:
      - format
    cmds:
      - gofmt -w .

  lint:
    desc: Run golangci-lint (same as CI)
    aliases:
      - lint:go
      - golangci-lint
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run ./...

  release:check:
    desc: Validate GoReleaser config using the pinned tools module
    cmds:
      - go run -modfile=tools/go.mod github.com/goreleaser/goreleaser/v2 check --config .goreleaser.yml

  release:snapshot:
    desc: Run a local GoReleaser snapshot build using the pinned tools module
    cmds:
      - go run -modfile=tools/go.mod github.com/goreleaser/goreleaser/v2 release --snapshot --clean --config .goreleaser.yml

  kill:boxy:
    desc: Kill any running boxy processes (Windows only, requires pwsh)
    platforms: [windows]
    cmds:
      - pwsh -Command "Get-Process -Name boxy -ErrorAction SilentlyContinue | Stop-Process -Force; Write-Host 'Done'"

  e2e:serve:
    desc: E2E validation of boxy serve (API + UI)
    cmds:
      - bash scripts/e2e-serve.sh {{.CLI_ARGS}}

---
version: '3'

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE: '{{now | date "2006-01-02T15:04:05Z07:00"}}'
  LDFLAGS: -s -w -X main.Version={{.VERSION}} -X main.GitCommit={{.GIT_COMMIT}} -X main.BuildDate={{.BUILD_DATE}}
  DIST_DIR: "{{.TASKFILE_DIR}}/dist"
  BINARY_NAME: boxy
  BUILD_FLAGS: -ldflags="{{.LDFLAGS}}"
  BUILD_FLAGS_RELEASE: -ldflags="{{.LDFLAGS}}" -trimpath

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
    silent: true

  # Build tasks
  build:
    desc: Build the boxy binary
    sources:
      - cmd/boxy/**/*.go
      - go.mod
      - go.sum
    generates:
      - ./{{.BINARY_NAME}}
    cmds:
      - CGO_ENABLED=0 go build {{.BUILD_FLAGS}} {{.CLI_ARGS}} -o {{.BINARY_NAME}} ./cmd/boxy

  build:release:
    desc: Build optimized release binary
    sources:
      - cmd/boxy/**/*.go
      - go.mod
      - go.sum
    generates:
      - ./{{.BINARY_NAME}}
    cmds:
      - CGO_ENABLED=0 go build {{.BUILD_FLAGS_RELEASE}} {{.CLI_ARGS}} -o {{.BINARY_NAME}} ./cmd/boxy

  build:all:
    desc: Build for all platforms
    summary: |
      Builds release binaries for all supported platforms.
      Output: ./dist/boxy-{OS}-{ARCH}[.exe]
    generates:
      - "{{.DIST_DIR}}/boxy-*"
    preconditions:
      - sh: test -d cmd/boxy
        msg: "cmd/boxy directory not found"
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - for:
          matrix:
            OS: [linux, linux, darwin, darwin, windows]
            ARCH: [amd64, arm64, amd64, arm64, amd64]
        cmd: >-
          GOOS={{.ITEM.OS}} GOARCH={{.ITEM.ARCH}} CGO_ENABLED=0 go build
          {{.BUILD_FLAGS_RELEASE}} {{.CLI_ARGS}}
          -o {{.DIST_DIR}}/boxy-{{.ITEM.OS}}-{{.ITEM.ARCH}}{{if eq .ITEM.OS "windows"}}.exe{{end}}
          ./cmd/boxy
      - ls -lh {{.DIST_DIR}}/

  # Install tasks
  install:
    desc: Install boxy to /usr/local/bin
    summary: |
      Builds the binary and installs it to /usr/local/bin.
      Requires sudo access.
    deps:
      - build
    preconditions:
      - sh: test -f {{.BINARY_NAME}}
        msg: "Binary not found. Run 'task build' first."
    prompt: "Install {{.BINARY_NAME}} to /usr/local/bin? (requires sudo)"
    cmds:
      - sudo mv {{.BINARY_NAME}} /usr/local/bin/

  # Test tasks
  test:
    desc: Run all tests
    cmds:
      - task: test:all

  test:unit:
    desc: Run unit tests only (fast)
    cmds:
      - go test -v -short {{.CLI_ARGS}} ./...

  test:integration:
    desc: Run integration tests (requires Docker)
    preconditions:
      - sh: command -v docker
        msg: "Docker is required to run integration tests."
    cmds:
      - go test -v -run Integration {{.CLI_ARGS}} ./tests/integration/...

  test:e2e:
    desc: Run end-to-end tests
    summary: |
      Builds the binary and runs E2E test suite.
      Requires the binary to be available.
    sources:
      - cmd/boxy/**/*.go
      - tests/e2e/**/*.go
      - go.mod
      - go.sum
    generates:
      - ./{{.BINARY_NAME}}
    cmds:
      - go build -o {{.BINARY_NAME}} ./cmd/boxy
      - go test -v -timeout 10m {{.CLI_ARGS}} ./tests/e2e/...

  test:stress:
    desc: Run stress tests
    cmds:
      - go test -v -timeout 30m {{.CLI_ARGS}} ./tests/stress/...

  test:all:
    desc: Run all test suites
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:e2e

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race -short {{.CLI_ARGS}} ./...

  test:coverage:
    desc: Generate coverage report
    summary: |
      Generates test coverage report and outputs coverage.html.
      Run 'open coverage.html' to view in browser.
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - coverage.html
    cmds:
      - go test -coverprofile=coverage.out {{.CLI_ARGS}} ./...
      - go tool cover -html=coverage.out -o coverage.html

  # Benchmark tasks
  bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem {{.CLI_ARGS}} ./...

  # Code quality tasks
  fmt:
    desc: Format code
    sources:
      - "**/*.go"
    cmds:
      - go fmt {{.CLI_ARGS}} ./...

  imports:
    desc: Format imports and code
    preconditions:
      - sh: command -v goimports
        msg: "goimports not found. Install with: go install golang.org/x/tools/cmd/goimports@latest"
    sources:
      - "**/*.go"
    cmds:
      - goimports -w {{.CLI_ARGS}} .

  lint:
    desc: Lint code
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint not found. Install with: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest"
    cmds:
      - golangci-lint run {{.CLI_ARGS}} ./...

  lint:yaml:
    desc: Lint YAML files
    summary: Run yamllint using the repository config file.
    preconditions:
      - sh: command -v yamllint
        msg: "yamllint not found. Install with: pip install yamllint or your preferred package manager."
    cmds:
      - yamllint -c .yamllint.yaml .

  lint:markdown:
    desc: Lint Markdown files
    preconditions:
      - sh: command -v markdownlint
        msg: "markdownlint not found. Install with: npm install -g markdownlint-cli@latest"
    cmds:
      - markdownlint --config .markdownlint.json "**/*.md"

  lint:dockerfile:
    desc: Lint the Dockerfile
    preconditions:
      - sh: test -x ./.bin/hadolint
        msg: "hadolint binary missing. Run ./scripts/prepare or check .bin/hadolint"
    cmds:
      - ./.bin/hadolint Dockerfile

  lint:secrets:
    desc: Scan for secrets
    preconditions:
      - sh: test -x ./.bin/gitleaks
        msg: "gitleaks binary missing. Run ./scripts/prepare or check .bin/gitleaks"
    cmds:
      - ./.bin/gitleaks detect --source . -v

  lint:govulns:
    desc: Scan dependencies for known vulnerabilities
    preconditions:
      - sh: command -v govulncheck
        msg: "govulncheck not found. Install with: go install golang.org/x/vuln/cmd/govulncheck@latest"
    cmds:
      - govulncheck ./...

  lint:all:
    desc: Run all linting and scanning tools
    summary: Aggregates every dedicated lint task so you can check everything with a single command.
    cmds:
      - task: lint
      - task: lint:yaml
      - task: lint:markdown
      - task: lint:dockerfile
      - task: lint:secrets
      - task: lint:govulns

  tidy:
    desc: Tidy dependencies
    cmds:
      - go mod tidy

  tools:install:
    desc: Install pinned development tools
    summary: |
      Installs all pinned development tools via go install -tags tools.
      Tools list is dynamically parsed from tools.go using ripgrep.
      This updates binaries in your Go bin directory ($GOPATH/bin or $HOME/go/bin).
    prompt: Install pinned development tools to Go bin directory?
    preconditions:
      - sh: command -v rg
        msg: "ripgrep (rg) not found. Install with: apt-get install ripgrep (or your package manager)"
    vars:
      TOOLS:
        sh: rg '^\s*_\s+"([^"]+)"' tools.go -o -r '$1' | xargs echo
    cmds:
      - for: { var: TOOLS, split: ' ' }
        cmd: go install -tags tools {{.CLI_ARGS }} {{.ITEM}}

  check:
    desc: Run all checks (format, lint, test, race)
    summary: |
      Runs format, imports, lint, unit tests, and race detector.
      Recommended before committing code.
    cmds:
      - task: fmt
      - task: imports
      - task: lint
      - task: test:unit
      - task: test:race

  # Example tasks
  example:build:
    internal: true
    desc: Build binary for examples
    summary: Builds the binary and places it in the example directory for use.
    vars:
      EXAMPLE_DIR: "{{.TASKFILE_DIR}}/examples/{{.EXAMPLE_NAME}}"
    preconditions:
      - sh: test -d {{.EXAMPLE_DIR}}
        msg: "Example directory {{.EXAMPLE_DIR}} not found"
    deps:
      - build
    cmds:
      - cp {{.TASKFILE_DIR}}/{{.BINARY_NAME}} {{.EXAMPLE_DIR}}/{{.BINARY_NAME}}

  example:list:
    desc: List available examples
    dir: examples
    silent: true
    cmds:
      - echo "Available examples"
      - find . -maxdepth 1 -mindepth 1 -type d | xargs -I {} basename {}

  example:scratch:
    desc: Run scratch provider quickstart example
    summary: |
      Runs the easiest quickstart - no Docker or VMs required!
      Creates a simple workspace using the scratch/shell provider.
      Perfect for learning Boxy and local testing.
    dir: examples/00-quickstart-scratch
    vars:
      EXAMPLE_NAME: 00-quickstart-scratch
    interactive: true
    cmds:
      - task: example:build
        vars:
          EXAMPLE_NAME: "{{.EXAMPLE_NAME}}"
      - echo "Starting Boxy scratch example..."
      - ./{{.BINARY_NAME}} serve --config boxy.yaml

  example:docker:
    desc: Run Docker pool example
    summary: |
      Runs the Docker pool configuration example.
      Creates Ubuntu containers and manages them via Boxy.
    dir: examples/01-simple-docker-pool
    vars:
      EXAMPLE_NAME: 01-simple-docker-pool
    preconditions:
      - sh: command -v docker
        msg: "Docker is required for this example."
    interactive: true
    cmds:
      - task: example:build
        vars:
          EXAMPLE_NAME: "{{.EXAMPLE_NAME}}"
      - echo "Starting Boxy Docker example..."
      - ./{{.BINARY_NAME}} serve --config boxy.yaml

  example:hooks:
    desc: Run hooks demonstration example
    summary: |
      Runs the hooks demo showing on_provision and on_allocate hooks.
      Demonstrates lifecycle customization with Docker containers.
    dir: examples/02-hooks-demo
    vars:
      EXAMPLE_NAME: 02-hooks-demo
    preconditions:
      - sh: command -v docker
        msg: "Docker is required for this example."
    interactive: true
    cmds:
      - task: example:build
        vars:
          EXAMPLE_NAME: "{{.EXAMPLE_NAME}}"
      - echo "Starting Boxy hooks demo..."
      - ./{{.BINARY_NAME}} serve --config boxy.yaml

  # Development tasks
  dev:
    desc: Development mode - build and run
    summary: |
      Builds the binary and starts the Boxy service.
      Use for local development and testing.
    deps:
      - build
    preconditions:
      - sh: test -f {{.BINARY_NAME}}
        msg: "Binary not found. Run 'task build' first."
    cmds:
      - ./{{.BINARY_NAME}} serve

  clean:
    desc: Clean build artifacts
    prompt: "Remove all build artifacts, coverage reports, and test databases?"
    cmds:
      - rm -f {{.BINARY_NAME}}
      - rm -rf {{.DIST_DIR}}/
      - rm -f coverage.out coverage.html
      - rm -f *.db *.db-shm *.db-wal
      - rm -rf tests/tmp

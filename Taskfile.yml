---
version: '3'

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: -s -w -X main.Version={{.VERSION}} -X main.GitCommit={{.GIT_COMMIT}} -X main.BuildDate={{.BUILD_DATE}}
  BINARY_NAME: boxy

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
    silent: true

  # Build tasks
  build:
    desc: Build the boxy binary with version info
    cmds:
      - echo "Building boxy {{.VERSION}}..."
      - CGO_ENABLED=0 go build -ldflags="{{.LDFLAGS}}" -o {{.BINARY_NAME}} ./cmd/boxy
      - echo "Build complete{{":"}} ./{{.BINARY_NAME}}"
      - ./{{.BINARY_NAME}} version

  build:release:
    desc: Build optimized release binary
    cmds:
      - echo "Building release binary {{.VERSION}}..."
      - CGO_ENABLED=0 go build -ldflags="{{.LDFLAGS}}" -trimpath -o {{.BINARY_NAME}} ./cmd/boxy
      - echo "Release build complete{{":"}} ./{{.BINARY_NAME}}"

  build:all:
    desc: Build for all platforms
    cmds:
      - echo "Building for all platforms..."
      - mkdir -p dist
      - cmd: go build -ldflags="{{.LDFLAGS}}" -trimpath -o dist/boxy-linux-amd64 ./cmd/boxy
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
      - cmd: go build -ldflags="{{.LDFLAGS}}" -trimpath -o dist/boxy-linux-arm64 ./cmd/boxy
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
      - cmd: go build -ldflags="{{.LDFLAGS}}" -trimpath -o dist/boxy-darwin-amd64 ./cmd/boxy
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
      - cmd: go build -ldflags="{{.LDFLAGS}}" -trimpath -o dist/boxy-darwin-arm64 ./cmd/boxy
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
      - cmd: go build -ldflags="{{.LDFLAGS}}" -trimpath -o dist/boxy-windows-amd64.exe ./cmd/boxy
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
      - echo "All builds complete in dist/"
      - ls -lh dist/

  # Install tasks
  install:
    desc: Install boxy to /usr/local/bin
    deps:
      - build
    cmds:
      - echo "Installing boxy to /usr/local/bin..."
      - sudo mv {{.BINARY_NAME}} /usr/local/bin/
      - echo "Installed"

  # Test tasks
  test:
    desc: Run all tests (default test suite)
    cmds:
      - task: test:unit
      - echo "All tests passed"

  test:unit:
    desc: Run unit tests only (fast)
    cmds:
      - echo "Running unit tests..."
      - go test -v -short ./...

  test:integration:
    desc: Run integration tests (requires Docker)
    cmds:
      - echo "Running integration tests..."
      - go test -v -run Integration ./tests/integration/...

  test:e2e:
    desc: Run end-to-end tests
    cmds:
      - echo "Running E2E tests..."
      - echo "Building binary for E2E tests..."
      - go build -o {{.BINARY_NAME}} ./cmd/boxy
      - go test -v -timeout 10m ./tests/e2e/...

  test:stress:
    desc: Run stress tests
    cmds:
      - echo "Running stress tests..."
      - go test -v -timeout 30m ./tests/stress/...

  test:all:
    desc: Run all test suites
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:e2e
      - echo "All test suites passed!"

  test:race:
    desc: Run tests with race detector
    cmds:
      - echo "Running tests with race detector..."
      - go test -race -short ./...

  test:coverage:
    desc: Generate coverage report
    cmds:
      - echo "Generating coverage report..."
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report{{":"}} coverage.html"

  # Benchmark tasks
  bench:
    desc: Run benchmarks
    cmds:
      - echo "Running benchmarks..."
      - go test -bench=. -benchmem ./...

  # Code quality tasks
  fmt:
    desc: Format code
    cmds:
      - echo "Formatting code..."
      - go fmt ./...
      - echo "Format complete"

  lint:
    desc: Lint code
    cmds:
      - echo "Linting code..."
      - cmd: |
          which golangci-lint >/dev/null || {
            echo "Installing golangci-lint..."
            go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          }
      - golangci-lint run ./...
      - echo "Lint complete"

  tidy:
    desc: Tidy dependencies
    cmds:
      - echo "Tidying dependencies..."
      - go mod tidy
      - echo "Tidy complete"

  check:
    desc: Run all checks (format, lint, test, race)
    cmds:
      - task: fmt
      - task: lint
      - task: test:unit
      - task: test:race
      - echo "All checks passed!"

  # Development tasks
  dev:
    desc: Development mode - build and run
    deps:
      - build
    cmds:
      - ./{{.BINARY_NAME}} serve

  # Clean tasks
  clean:
    desc: Clean build artifacts
    cmds:
      - echo "Cleaning..."
      - rm -f {{.BINARY_NAME}}
      - rm -rf dist/
      - rm -f coverage.out coverage.html
      - rm -f *.db *.db-shm *.db-wal
      - rm -rf tests/tmp
      - echo "Clean complete"

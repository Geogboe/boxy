version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gosec
    - gocritic
  exclusions:
    generated: lax
    presets:
      - legacy
      - std-error-handling
      - common-false-positives
    rules:
      - linters: [errcheck]
        path: _test\.go

# Release pipeline — uses release-please to manage versions and changelogs,
# then builds multi-platform binaries when a release is created.
name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build Release Assets
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set build variables
        id: vars
        run: |
          echo "version=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          LDFLAGS: >-
            -s -w
            -X main.Version=${{ steps.vars.outputs.version }}
            -X main.GitCommit=${{ steps.vars.outputs.commit }}
            -X main.BuildDate=${{ steps.vars.outputs.date }}
        run: |
          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            output="dist/boxy-${os}-${arch}"
            if [ "$os" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building ${os}/${arch}..."
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build \
              -ldflags="${LDFLAGS}" -trimpath \
              -o "$output" ./cmd/boxy
          done
          ls -lh dist/

      - name: Generate checksums
        working-directory: dist
        run: sha256sum boxy-* > checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/*

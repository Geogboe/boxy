---
# Devfactory containers — simulated container pool, no real infrastructure.
server:
  listen: ":9090"

providers:
  - name: devfactory-local
    type: devfactory
    config:
      profile: container
      data_dir: .boxy/devfactory

pools:
  - name: web
    type: container
    provider: devfactory-local
    policy:
      preheat:
        min_ready: 2
        max_total: 4
      recycle:
        max_age: 1h

---
# Docker pool example.
#
# Container pools for a pentest lab environment. Kali attacker boxes
# and vulnerable target containers from a local Docker daemon.
server:
  listen: ":9090"
  providers: [docker]

# agents:
#   - name: build-host
#     providers: [docker]

pools:
  - name: kali
    type: docker
    config:
      image: kalilinux/kali-rolling
      command: ["/bin/bash"]
      env:
        TERM: xterm-256color
      labels:
        role: attacker
      resources:
        cpu: "2.0"
        memory: 4096m
    policy:
      preheat:
        min_ready: 3
        max_total: 8
      recycle:
        max_age: 4h

  # Lightweight Ubuntu targets for basic exercises.
  - name: ubuntu-targets
    type: container
    provider: docker-local
    config:
      image: ubuntu:22.04
      command: ["/usr/sbin/sshd", "-D"]
      labels:
        role: target
      resources:
        cpu: "1.0"
        memory: 1024m
    policy:
      preheat:
        min_ready: 5
        max_total: 15

  # Juice Shop vulnerable web app targets (remote Docker host).
  - name: juiceshop-targets
    type: container
    provider: docker-remote
    config:
      image: bkimminich/juice-shop
      ports:
        - "3000"
      labels:
        role: target
        app: juiceshop
      resources:
        cpu: "1.0"
        memory: 512m
    policy:
      preheat:
        min_ready: 2
        max_total: 6

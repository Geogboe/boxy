---
# Docker pool example.
#
# Lightweight container pools for a pentest lab environment.
# Uses alpine images for minimal resource usage during testing.
server:
  listen: ":9090"

# agents:
#   - name: build-host
#     providers: [docker]

pools:
  - name: attackers
    type: docker
    config:
      image: alpine:latest
      command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
      labels:
        role: attacker
      hardware:
        cpu: "0.5"
        memory: 128m
    hooks:
      on_create:
        - run: "apk add --no-cache nmap"
    policy:
      preheat:
        min_ready: 2
        max_total: 5
      recycle:
        max_age: 4h

  # Target containers.
  - name: targets
    type: docker
    config:
      image: alpine:latest
      command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
      labels:
        role: target
      hardware:
        cpu: "0.5"
        memory: 128m
    policy:
      preheat:
        min_ready: 2
        max_total: 5

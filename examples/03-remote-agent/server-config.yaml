---
# Server Configuration
# Run this on your Linux machine (or any machine)
#
# Usage: boxy serve --config server-config.yaml

# Define remote agents
agents:
  - id: windows-agent
    # IMPORTANT: Change this to your Windows machine's IP or hostname
    # Examples:
    #   - "192.168.1.100:50051"
    #   - "windows-desktop.local:50051"
    #   - "win-hyperv-01:50051"
    address: "localhost:50051"  # Change this!

    providers: ["hyperv"]

    # TLS settings (optional, recommended for production)
    use_tls: false
    # tls_cert_path: "/path/to/client.crt"
    # tls_key_path: "/path/to/client.key"
    # tls_ca_path: "/path/to/ca.crt"

# Define pools using remote providers
pools:
  - name: hyperv-pool
    type: vm
    # Backend format: {agent-id}-{provider-name}
    backend: windows-agent-hyperv

    # Hyper-V VM specification
    image: "windows-server-2022"
    min_ready: 1
    max_total: 3
    cpus: 2
    memory_mb: 4096
    disk_gb: 60

    timeouts:
      provision: 15m  # Hyper-V VMs take longer than containers
      finalization: 10m
      personalization: 5m

storage:
  type: sqlite
  path: ./boxy.db

logging:
  level: info
  format: text
---

---
# Agent Configuration
# Run this on your Windows machine with Hyper-V
#
# Usage: boxy agent serve --config agent-config.yaml

# Agents are stateless - no pools, no storage
# They simply expose local providers to remote servers

logging:
  level: info
  format: text

# Agent settings are passed via CLI flags:
# --listen :50051              # Port to listen on
# --providers hyperv           # Which providers to enable (auto-detected if omitted)
# --use-tls                    # Enable TLS (requires cert files)
# --tls-cert /path/to/cert.pem
# --tls-key /path/to/key.pem
# --tls-ca /path/to/ca.pem
---

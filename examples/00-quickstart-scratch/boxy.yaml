# Quickstart Example: Scratch Provider
#
# This is the simplest way to try Boxy - no Docker or VMs required!
# The scratch/shell provider creates lightweight filesystem-based workspaces.
#
# Perfect for:
# - First-time users learning Boxy
# - Local development and testing
# - CI/CD pipelines
# - Quick prototyping
#
# Note: This provider does NOT provide isolation - it's just directories
# on your filesystem. For production, use Docker or Hyper-V.

pools:
  - name: scratch-pool
    type: process
    backend: scratch/shell
    image: local-workspace  # Not used by scratch provider but required
    min_ready: 3            # Keep 3 workspaces ready
    max_total: 10           # Maximum 10 total workspaces

    # Optional: Configure where workspaces are created
    extra_config:
      base_dir: /tmp/boxy-scratch       # Base directory for all workspaces
      allowed_shells:                    # Shells to try (in order)
        - bash
        - sh
      min_free_bytes: 1073741824        # Require 1GB free space

    # Optional: Add hooks to customize workspaces
    hooks:
      after_provision:
        # This runs when the workspace is first created
        - name: create-readme
          type: script
          shell: bash
          inline: |
            # Create a welcome file in the workspace
            echo "# Boxy Scratch Workspace" > /tmp/boxy-scratch/${resource.id}/workspace/README.md
            echo "" >> /tmp/boxy-scratch/${resource.id}/workspace/README.md
            echo "Resource ID: ${resource.id}" >> /tmp/boxy-scratch/${resource.id}/workspace/README.md
            echo "Pool: ${pool.name}" >> /tmp/boxy-scratch/${resource.id}/workspace/README.md
            echo "Created: $(date)" >> /tmp/boxy-scratch/${resource.id}/workspace/README.md
          timeout: 10s

      before_allocate:
        # This runs when allocating to a user
        - name: personalize-workspace
          type: script
          shell: bash
          inline: |
            # Add user-specific files
            WORKSPACE=/tmp/boxy-scratch/${resource.id}/workspace
            echo "export PS1='[boxy:${resource.id:0:8}] \w\$ '" > $WORKSPACE/.bashrc
            echo "echo 'Welcome to your Boxy workspace!'" >> $WORKSPACE/.bashrc
            echo "echo 'Workspace: $WORKSPACE'" >> $WORKSPACE/.bashrc
          timeout: 5s

# Storage configuration (uses SQLite by default)
storage:
  type: sqlite
  path: ~/.config/boxy/quickstart.db

# Logging
logging:
  level: info
  format: text

# HTTP API (optional)
api:
  enabled: true
  listen: :8080
  read_timeout_secs: 10
  write_timeout_secs: 10
  idle_timeout_secs: 60

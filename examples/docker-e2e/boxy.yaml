---
# Docker end-to-end test.
#
# Pool of 10 alpine containers. Create multiple sandboxes pulling from the same pool.
server:
  listen: ":9090"

pools:
  - name: alpine-pool
    type: docker
    config:
      image: alpine:latest
      command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    policy:
      preheat:
        min_ready: 10
        max_total: 15
      recycle:
        max_age: 1h

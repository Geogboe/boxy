---
# Docker pool with lifecycle hooks
# This example shows finalization and personalization hooks

pools:
  - name: dev-containers
    type: container
    backend: docker
    image: ubuntu:22.04
    min_ready: 2
    max_total: 5
    cpus: 2
    memory_mb: 2048

    # Hook configuration
    hooks:
      # after_provision hooks run during pool warming (finalization)
      # These are slow, background operations to prepare resources
      after_provision:
        - name: install-tools
          type: script
          shell: bash
          inline: |
            apt-get update
            apt-get install -y git curl vim
            echo "Tools installed on ${resource.id}"

        - name: validate-network
          type: script
          shell: bash
          inline: |
            ping -c 1 8.8.8.8
            echo "Network validated for ${resource.ip}"
          timeout: 30s
          retry: 2

      # before_allocate hooks run during allocation (personalization)
      # These are fast, user-specific operations
      before_allocate:
        - name: create-user
          type: script
          shell: bash
          inline: |
            useradd -m ${username}
            echo "${username}:${password}" | chpasswd
            echo "Created user ${username}"

        - name: setup-workspace
          type: script
          shell: bash
          inline: |
            mkdir -p /home/${username}/workspace
            chown ${username}:${username} /home/${username}/workspace
            echo "Workspace ready for ${username}"

    # Timeout configuration
    timeouts:
      provision: 5m         # How long provider can take to provision
      finalization: 10m     # How long all after_provision hooks can take
      personalization: 30s  # How long all before_allocate hooks can take
      destroy: 1m

storage:
  type: sqlite
  path: ~/.config/boxy/boxy.db

logging:
  level: info
  format: text
---

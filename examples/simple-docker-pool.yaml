---
# Simple Docker pool configuration
# This example shows a basic pool with Docker containers

pools:
  - name: ubuntu-pool
    type: container
    backend: docker
    image: ubuntu:22.04
    min_ready: 3      # Keep 3 containers always ready
    max_total: 10     # Maximum 10 containers total
    cpus: 2
    memory_mb: 1024
    health_check_interval: 30s

storage:
  type: sqlite
  path: ~/.config/boxy/boxy.db

logging:
  level: info
  format: text
---

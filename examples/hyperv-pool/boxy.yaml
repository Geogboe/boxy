---
# Hyper-V pool example.
#
# Two pools of Windows Server 2022 VMs from the same Hyper-V host.
# The provisioner discovers that win2022-sql shares the same base config
# as win2022-base and can reuse surplus resources as a build cache.

providers:
  - name: hyperv-lab
    type: hyperv
    config:
      host: lab-host.internal
      credential: winrm-admin

pools:
  # Base Windows Server 2022 VM pool.
  - name: win2022-base
    type: vm
    provider: hyperv-lab
    config: &win2022
      template: "Windows Server 2022 Standard"
      generation: 2
      cpu: 4
      memory_mb: 8192
      disk_gb: 80
      network_switch: "LabSwitch"
    policy:
      preheat:
        min_ready: 5
        max_total: 10
      recycle:
        max_age: 168h

  # SQL Server pool. Shares the same base config as win2022-base;
  # the provisioner can steal surplus VMs and install SQL on top.
  - name: win2022-sql
    type: vm
    provider: hyperv-lab
    config:
      <<: *win2022
      packages: [mssql-server-2022]
    policy:
      preheat:
        min_ready: 2
        max_total: 4

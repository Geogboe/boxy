# Advanced hooks configuration
# Shows retry, continue_on_failure, multiple shells, and external scripts

pools:
  - name: production-ready
    type: container
    backend: docker
    image: ubuntu:22.04
    min_ready: 3
    max_total: 10
    cpus: 4
    memory_mb: 4096

    hooks:
      # Finalization: Complex setup after provisioning
      after_provision:
        - name: system-update
          type: script
          shell: bash
          inline: |
            apt-get update
            apt-get upgrade -y
          timeout: 10m
          retry: 3  # Retry up to 3 times if fails

        - name: install-monitoring
          type: script
          shell: bash
          inline: |
            apt-get install -y prometheus-node-exporter
            systemctl enable prometheus-node-exporter
          timeout: 5m
          continue_on_failure: true  # Don't fail if monitoring install fails

        - name: validate-disk-space
          type: script
          shell: bash
          inline: |
            AVAILABLE=$(df / | tail -1 | awk '{print $4}')
            if [ "$AVAILABLE" -lt 10000000 ]; then
              echo "Insufficient disk space"
              exit 1
            fi
            echo "Disk space validated: ${AVAILABLE}KB available"
          timeout: 10s

        - name: python-health-check
          type: script
          shell: python
          inline: |
            import socket
            import sys

            hostname = socket.gethostname()
            print(f"Hostname: {hostname}")

            # Validate resource ID is set
            resource_id = "${resource.id}"
            if not resource_id:
                print("ERROR: Resource ID not set")
                sys.exit(1)

            print(f"Health check passed for {resource_id}")
          timeout: 30s

      # Personalization: Fast user-specific setup
      before_allocate:
        - name: create-user-account
          type: script
          shell: bash
          inline: |
            # Create user with home directory
            useradd -m -s /bin/bash ${username}
            echo "${username}:${password}" | chpasswd

            # Add to groups
            usermod -aG sudo,docker ${username}

            # Set up SSH if needed
            mkdir -p /home/${username}/.ssh
            chmod 700 /home/${username}/.ssh
            chown -R ${username}:${username} /home/${username}/.ssh

            echo "User ${username} created successfully"
          timeout: 60s

        - name: configure-shell
          type: script
          shell: bash
          inline: |
            # Create custom .bashrc
            cat > /home/${username}/.bashrc <<'BASHRC'
            export PS1='\u@\h:\w\$ '
            export EDITOR=vim
            alias ll='ls -la'
            BASHRC

            chown ${username}:${username} /home/${username}/.bashrc
          timeout: 10s
          continue_on_failure: true

        - name: initialize-workspace
          type: script
          shell: python
          inline: |
            import os
            import pwd

            username = "${username}"
            home = pwd.getpwnam(username).pw_dir

            # Create workspace directories
            for dir in ['workspace', 'projects', 'tmp']:
                path = os.path.join(home, dir)
                os.makedirs(path, exist_ok=True)
                os.chown(path, pwd.getpwnam(username).pw_uid, pwd.getpwnam(username).pw_gid)

            print(f"Workspace initialized for {username}")
          timeout: 30s

    # Custom timeout configuration
    timeouts:
      provision: 10m       # Provider provision timeout
      finalization: 30m    # All after_provision hooks combined
      personalization: 2m  # All before_allocate hooks combined
      destroy: 2m

    # Health check configuration
    health_check_interval: 60s

storage:
  type: sqlite
  path: ~/.config/boxy/boxy.db

logging:
  level: debug  # Verbose logging for troubleshooting
  format: json

syntax = "proto3";

package provider;

option go_package = "github.com/Geogboe/boxy/pkg/provider/proto";

// ProviderService defines the gRPC interface for remote provider operations.
// Agents expose this service, and the server calls it to manage resources remotely.
service ProviderService {
  // Provision creates a new resource based on the specification
  rpc Provision(ProvisionRequest) returns (ProvisionResponse);

  // Destroy removes a resource and cleans up all associated data
  rpc Destroy(DestroyRequest) returns (DestroyResponse);

  // GetStatus returns the current status of a resource
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetConnectionInfo returns connection details for a resource
  rpc GetConnectionInfo(GetConnectionInfoRequest) returns (GetConnectionInfoResponse);

  // HealthCheck verifies the provider is operational
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// AgentService defines the gRPC interface for agent management.
// Agents call these methods to register and send heartbeats.
service AgentService {
  // Register registers an agent with the server
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat sends periodic heartbeat to indicate agent is alive
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // ListProviders returns the list of providers available on the agent
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
}

// ===== Provider Service Messages =====

message ProvisionRequest {
  // Name of the provider to use (docker, hyperv, kvm, etc.)
  string provider_name = 1;

  // Resource specification
  ResourceSpec spec = 2;
}

message ProvisionResponse {
  // The provisioned resource
  Resource resource = 1;
}

message DestroyRequest {
  // Name of the provider
  string provider_name = 1;

  // Resource to destroy
  Resource resource = 2;
}

message DestroyResponse {
  // Success status
  bool success = 1;
}

message GetStatusRequest {
  // Name of the provider
  string provider_name = 1;

  // Resource to check status for
  Resource resource = 2;
}

message GetStatusResponse {
  // Current resource status
  ResourceStatus status = 1;
}

message GetConnectionInfoRequest {
  // Name of the provider
  string provider_name = 1;

  // Resource to get connection info for
  Resource resource = 2;
}

message GetConnectionInfoResponse {
  // Connection information
  ConnectionInfo connection_info = 1;
}

message HealthCheckRequest {
  // Name of the provider to health check
  string provider_name = 1;
}

message HealthCheckResponse {
  // Healthy status
  bool healthy = 1;

  // Optional message (error details if unhealthy)
  string message = 2;
}

// ===== Agent Service Messages =====

message RegisterRequest {
  // Unique agent ID (from certificate CN)
  string agent_id = 1;

  // Agent address (host:port) for server to connect
  string address = 2;

  // List of provider names available on this agent
  repeated string providers = 3;

  // Agent version
  string version = 4;

  // Agent hostname
  string hostname = 5;

  // Agent OS
  string os = 6;

  // Agent architecture
  string arch = 7;
}

message RegisterResponse {
  // Success status
  bool success = 1;

  // Message (error details if failed)
  string message = 2;

  // Server-assigned configuration (optional)
  map<string, string> config = 3;
}

message HeartbeatRequest {
  // Agent ID
  string agent_id = 1;

  // Current resource counts per provider
  repeated ProviderStats provider_stats = 2;

  // Agent uptime in seconds
  int64 uptime_seconds = 3;
}

message HeartbeatResponse {
  // Success status
  bool success = 1;

  // Server time (for clock sync check)
  int64 server_time = 2;
}

message ListProvidersRequest {
  // Agent ID
  string agent_id = 1;
}

message ListProvidersResponse {
  // Available providers
  repeated ProviderInfo providers = 1;
}

// ===== Domain Models =====

message ResourceSpec {
  // Resource type (container, vm, process)
  string type = 1;

  // Provider type (docker, hyperv, kvm, vmware)
  string provider_type = 2;

  // Image or template name
  string image = 3;

  // CPU allocation
  int32 cpus = 4;

  // Memory in MB
  int32 memory_mb = 5;

  // Disk size in GB
  int32 disk_gb = 6;

  // Labels (key-value pairs)
  map<string, string> labels = 7;

  // Environment variables
  map<string, string> environment = 8;

  // Extra configuration (flexible JSON)
  map<string, string> extra_config = 9;
}

message Resource {
  // Unique resource ID (UUID)
  string id = 1;

  // Pool ID this resource belongs to
  string pool_id = 2;

  // Sandbox ID (if allocated)
  string sandbox_id = 3;

  // Resource type
  string type = 4;

  // Resource state
  string state = 5;

  // Provider type
  string provider_type = 6;

  // Provider-specific ID
  string provider_id = 7;

  // Resource specification
  map<string, string> spec = 8;

  // Provider metadata
  map<string, string> metadata = 9;

  // Creation timestamp (Unix seconds)
  int64 created_at = 10;

  // Last update timestamp (Unix seconds)
  int64 updated_at = 11;

  // Expiration timestamp (Unix seconds, 0 if no expiration)
  int64 expires_at = 12;
}

message ResourceStatus {
  // Resource state
  string state = 1;

  // Healthy flag
  bool healthy = 2;

  // Status message
  string message = 3;

  // Last check timestamp (Unix seconds)
  int64 last_check = 4;

  // Uptime in seconds
  int64 uptime_seconds = 5;

  // CPU usage percentage (0-100)
  double cpu_usage = 6;

  // Memory used in bytes
  uint64 memory_used = 7;
}

message ConnectionInfo {
  // Connection type (ssh, rdp, http, docker-exec, etc.)
  string type = 1;

  // Host address
  string host = 2;

  // Port number
  int32 port = 3;

  // Username
  string username = 4;

  // Password (encrypted in transit via TLS)
  string password = 5;

  // SSH private key (if applicable)
  string ssh_key = 6;

  // Extra connection fields (flexible)
  map<string, string> extra_fields = 7;
}

message ProviderInfo {
  // Provider name (docker, hyperv, etc.)
  string name = 1;

  // Provider type (container, vm, process)
  string type = 2;

  // Healthy status
  bool healthy = 3;

  // Version information
  string version = 4;

  // Last health check timestamp
  int64 last_health_check = 5;
}

message ProviderStats {
  // Provider name
  string provider_name = 1;

  // Total resources managed
  int32 total_resources = 2;

  // Ready resources
  int32 ready_resources = 3;

  // Allocated resources
  int32 allocated_resources = 4;

  // Error resources
  int32 error_resources = 5;
}

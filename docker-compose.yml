version: '3.8'

services:
  # Boxy service
  boxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boxy-service
    privileged: true  # Required for Docker-in-Docker
    volumes:
      # Mount Docker socket for managing containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist Boxy data
      - boxy-data:/home/boxy/.config/boxy
      # Optional: mount your config file
      # - ./boxy.yaml:/home/boxy/.config/boxy/boxy.yaml:ro
    environment:
      # Configuration via environment variables
      # Uncomment and customize as needed:
      # - BOXY_STORAGE_TYPE=sqlite
      # - BOXY_STORAGE_PATH=/home/boxy/.config/boxy/boxy.db
      # - BOXY_LOGGING_LEVEL=info
      # - BOXY_LOGGING_FORMAT=text
      # - BOXY_ENCRYPTION_KEY=<base64-encoded-32-byte-key>
    command: ["serve"]
    networks:
      - boxy-net
    restart: unless-stopped
    healthcheck:
      # Basic healthcheck - replace with actual health endpoint when available
      test: ["CMD", "pgrep", "-f", "boxy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  boxy-data:
    driver: local

networks:
  boxy-net:
    driver: bridge

---
# Boxy Configuration Example

# Storage configuration
storage:
  type: sqlite
  path: ~/.config/boxy/boxy.db

# Logging configuration
logging:
  level: info    # debug, info, warn, error
  format: text   # text, json

# Pool definitions
pools:
  # Ubuntu containers
  - name: ubuntu-containers
    type: container
    backend: docker
    image: ubuntu:22.04
    min_ready: 3
    max_total: 10
    cpus: 2
    memory_mb: 512
    labels:
      environment: dev
      managed_by: boxy
    health_check_interval: 30s

  # Alpine containers (lightweight)
  - name: alpine-containers
    type: container
    backend: docker
    image: alpine:latest
    min_ready: 5
    max_total: 20
    cpus: 1
    memory_mb: 128
    health_check_interval: 30s

  # Nginx containers
  - name: nginx-containers
    type: container
    backend: docker
    image: nginx:alpine
    min_ready: 2
    max_total: 5
    cpus: 1
    memory_mb: 256
    environment:
      NGINX_PORT: "8080"
    health_check_interval: 30s
